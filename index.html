<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internal Department Event Ticket Booking</title>
    <link rel="stylesheet" href="styles.css">
    
    <!-- React & ReactDOM (Development versions for Live Server) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel for compiling JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>
    
    <!-- Load components in order (using text/babel) -->
    <script type="text/babel" src="components/EventList.js"></script>
    <script type="text/babel" src="components/BookingForm.js"></script>
    <script type="text/babel" src="components/Confirmation.js"></script>
    
    <!-- Load main App component and render -->
    <script type="text/babel" src="App.js"></script>
</body>
</html>
